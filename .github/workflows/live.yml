name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Install FFmpeg
      run: sudo apt update && sudo apt install -y ffmpeg

    - name: Start Streaming
      run: |
        ffmpeg -re -i "https://docs.google.com/uc?export=download&id=1cFkAi_I26R1-F8lMIHXhHUbKggduuNgq" -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}
